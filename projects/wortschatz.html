<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wortschatz · German A1 A2 B1 Flashcards</title>
<style>
  :root{
    --paper:#f5efe3; --card:#fffdf6; --ink:#211d17; --ink-soft:#6b6357;
    --line:#d8cfbd; --line-soft:#e7dfd0;
    --der:#2456a6; --die:#b03060; --das:#2e7d4f;
    --accent:#b4451f; --accent-ink:#fff;
    --ok:#2e6b3f; --ok-bg:#e4efe2; --bad:#a8332e; --bad-bg:#f6e3e0;
    --amber:#c98a1b; --gray:#cfc6b4;
    --radius:14px;
    --shadow:0 1px 0 rgba(33,29,23,.06), 0 6px 18px -8px rgba(33,29,23,.25);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.45;
    min-height:100vh; padding-bottom:40px;
  }
  .serif{font-family:Charter,Georgia,Cambria,"Times New Roman",serif;}

  header.app{
    max-width:680px; margin:0 auto; padding:18px 18px 6px;
    display:flex; align-items:baseline; justify-content:space-between; gap:10px;
  }
  header.app h1{
    font-family:Charter,Georgia,serif; font-weight:700; letter-spacing:-.01em;
    font-size:26px; margin:0;
  }
  header.app h1 .tilde{color:var(--accent);}
  header.app .sub{font-size:12.5px; color:var(--ink-soft); white-space:nowrap;}

  nav.tabs{
    max-width:680px; margin:4px auto 0; padding:0 18px;
    display:flex; gap:22px; border-bottom:1.5px solid var(--line);
  }
  nav.tabs button{
    appearance:none; background:none; border:none; cursor:pointer;
    font:inherit; font-size:15px; font-weight:600; color:var(--ink-soft);
    padding:10px 2px 9px; margin-bottom:-1.5px; border-bottom:2.5px solid transparent;
  }
  nav.tabs button.on{color:var(--ink); border-bottom-color:var(--accent);}

  main{max-width:680px; margin:0 auto; padding:16px 18px 0;}

  /* ---------- controls ---------- */
  .row{display:flex; flex-wrap:wrap; gap:8px; align-items:center;}
  .chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{
    appearance:none; border:1.5px solid var(--line); background:var(--card);
    color:var(--ink-soft); font:inherit; font-size:13.5px; font-weight:600;
    padding:7px 13px; border-radius:999px; cursor:pointer;
  }
  .chip.on{border-color:var(--ink); color:var(--ink); background:#fff;}
  .lbl{font-size:11px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--ink-soft); margin:14px 0 6px;}
  .lbl:first-child{margin-top:2px;}

  /* ---------- stats ---------- */
  .stats{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px; margin-top:16px;}
  .stats .nums{display:flex; gap:18px; flex-wrap:wrap; margin-bottom:10px;}
  .stats .n b{display:block; font-size:21px; line-height:1.1; font-family:Charter,Georgia,serif;}
  .stats .n span{font-size:12px; color:var(--ink-soft);}
  .n.mast b{color:var(--ok);} .n.learn b{color:var(--amber);} .n.due b{color:var(--accent);}
  .bar{height:8px; border-radius:99px; background:var(--gray); overflow:hidden; display:flex;}
  .bar i{display:block; height:100%;}
  .bar .m{background:var(--ok);} .bar .l{background:var(--amber);}

  .start{
    margin-top:16px; width:100%;
    appearance:none; border:none; cursor:pointer;
    background:var(--accent); color:var(--accent-ink);
    font:inherit; font-size:17px; font-weight:700;
    padding:15px; border-radius:var(--radius); box-shadow:var(--shadow);
  }
  .start:active{transform:translateY(1px);}
  .start[disabled]{background:var(--gray); color:#8a8170; cursor:default;}
  .hint{font-size:13px; color:var(--ink-soft); margin-top:10px; text-align:center;}

  /* ---------- study ---------- */
  .study-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .study-top .back{appearance:none; background:none; border:none; cursor:pointer; font:inherit; color:var(--ink-soft); font-weight:600; padding:6px 8px 6px 0;}
  .study-top .count{font-size:13.5px; color:var(--ink-soft); font-variant-numeric:tabular-nums;}
  .sbar{height:5px; border-radius:99px; background:var(--gray); overflow:hidden; margin-bottom:18px;}
  .sbar i{display:block; height:100%; background:var(--accent); transition:width .25s;}

  .card3d{perspective:1200px;}
  .fcard{
    position:relative; width:100%; min-height:340px; cursor:pointer;
    transform-style:preserve-3d; transition:transform .45s cubic-bezier(.2,.7,.3,1);
  }
  .fcard.flip{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    background:var(--card); border:1px solid var(--line-soft); border-radius:18px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; overflow-y:auto;
    padding:30px 22px 16px; text-align:center;
  }
  .face .ctr{margin:auto; width:100%; display:flex; flex-direction:column; align-items:center;}
  .face.back{transform:rotateY(180deg);}
  .face .tag{position:absolute; top:12px; left:14px; font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--ink-soft);}
  .face .lvltag{position:absolute; top:12px; right:14px; font-size:11px; font-weight:700; letter-spacing:.05em; color:var(--ink-soft); border:1px solid var(--line); border-radius:6px; padding:2px 7px; background:var(--paper);}
  .word{font-family:Charter,Georgia,serif; font-size:36px; line-height:1.15; font-weight:700; letter-spacing:-.01em; overflow-wrap:anywhere;}
  .word .art{font-weight:400;}
  .art.der{color:var(--der);} .art.die{color:var(--die);} .art.das{color:var(--das);}
  .plural{margin-top:8px; font-size:15px; color:var(--ink-soft);}
  .forms{margin-top:6px; font-size:14.5px; color:var(--ink-soft); font-style:italic; max-width:48ch;}
  .trans{font-size:24px; font-weight:600; line-height:1.3; max-width:30ch;}
  .ex{margin-top:18px; padding-top:14px; border-top:1px dashed var(--line); max-width:50ch;}
  .ex .de{font-size:15.5px; font-style:italic;}
  .ex .en{font-size:13.5px; color:var(--ink-soft); margin-top:3px;}
  .taphint{margin-top:16px; font-size:12px; color:var(--ink-soft); opacity:.8;}

  .grade{display:flex; gap:10px; margin-top:16px;}
  .grade button{
    flex:1; appearance:none; cursor:pointer; font:inherit; font-weight:700; font-size:16px;
    padding:15px 8px; border-radius:var(--radius); border:1.5px solid transparent; box-shadow:var(--shadow);
  }
  .grade .no{background:var(--bad-bg); color:var(--bad); border-color:#e3c2bd;}
  .grade .yes{background:var(--ok-bg); color:var(--ok); border-color:#c2d8bf;}
  .grade button small{display:block; font-weight:500; font-size:11.5px; opacity:.75;}
  .reveal{
    width:100%; margin-top:16px; appearance:none; cursor:pointer; font:inherit; font-weight:700; font-size:16px;
    padding:15px 8px; border-radius:var(--radius); border:1.5px solid var(--line); background:var(--card); color:var(--ink); box-shadow:var(--shadow);
  }

  .done{background:var(--card); border:1px solid var(--line-soft); border-radius:18px; box-shadow:var(--shadow); padding:34px 22px; text-align:center;}
  .done h2{font-family:Charter,Georgia,serif; margin:0 0 6px; font-size:26px;}
  .done p{color:var(--ink-soft); margin:4px 0;}
  .done .nums{display:flex; justify-content:center; gap:26px; margin:18px 0 6px;}
  .done .nums b{display:block; font-size:26px; font-family:Charter,Georgia,serif;}
  .done .nums .ok b{color:var(--ok);} .done .nums .bad b{color:var(--bad);}

  /* ---------- browse ---------- */
  .search{
    width:100%; font:inherit; font-size:16px; padding:11px 14px; border-radius:12px;
    border:1.5px solid var(--line); background:var(--card); color:var(--ink); outline:none;
  }
  .search:focus{border-color:var(--ink);}
  .wlist{margin-top:12px; background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;}
  .wrow{display:flex; gap:10px; align-items:baseline; padding:11px 14px; border-bottom:1px solid var(--line-soft);}
  .wrow:last-child{border-bottom:none;}
  .wrow .dot{width:8px; height:8px; border-radius:99px; background:var(--gray); flex:none; align-self:center;}
  .wrow .dot.l{background:var(--amber);} .wrow .dot.m{background:var(--ok);}
  .wrow .de{font-family:Charter,Georgia,serif; font-weight:700; font-size:16.5px;}
  .wrow .de .art{font-weight:400;}
  .wrow .pl{color:var(--ink-soft); font-size:13px; font-family:Charter,Georgia,serif;}
  .wrow .en{margin-left:auto; text-align:right; color:var(--ink-soft); font-size:14px; max-width:46%;}
  .wrow .lv{flex:none; font-size:10.5px; font-weight:700; color:var(--ink-soft); border:1px solid var(--line); border-radius:5px; padding:1px 5px; align-self:center;}
  .more{width:100%; appearance:none; border:none; background:none; cursor:pointer; font:inherit; font-weight:700; color:var(--accent); padding:13px;}
  .count-line{font-size:13px; color:var(--ink-soft); margin-top:10px;}

  /* ---------- data tab ---------- */
  .panel{background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-top:14px;}
  .panel h3{margin:0 0 8px; font-size:15.5px;}
  .panel p{font-size:13.5px; color:var(--ink-soft); margin:0 0 10px;}
  .panel textarea{
    width:100%; min-height:110px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px;
    border:1.5px solid var(--line); border-radius:10px; padding:10px; background:#fffefb; color:var(--ink); resize:vertical;
  }
  .btn{
    appearance:none; cursor:pointer; font:inherit; font-weight:700; font-size:14px;
    padding:10px 16px; border-radius:11px; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
  }
  .btn.warn{color:var(--bad); border-color:#e3c2bd; background:var(--bad-bg);}
  .btn + .btn{margin-left:8px;}
  .msg{font-size:13px; margin-top:8px; min-height:18px;}
  .msg.ok{color:var(--ok);} .msg.err{color:var(--bad);}
  .storage-note{font-size:12.5px; color:var(--ink-soft); margin-top:14px; text-align:center;}
  .footnote{max-width:680px; margin:26px auto 0; padding:0 18px; font-size:12px; color:var(--ink-soft); text-align:center;}
</style>
</head>

<header class="app">
  <h1>Wort<span class="tilde">·</span>schatz</h1>

  <button id="tab-study" class="on">Study</button>
  <button id="tab-browse">Words</button>
  <button id="tab-data">Data</button>
</nav>
<main id="main"></main>

    }catch(e){}
    try{
      localStorage.setItem("__wt","1"); localStorage.removeItem("__wt");
      mode = "local";
    }catch(e){ mode = "memory"; }
  }
  async function load(){
    if (mode === "claude"){
      try{ const r = await window.storage.get(KEY); return r && r.value ? JSON.parse(r.value) : null; }
      catch(e){ return null; }
    }
    if (mode === "local"){
      try{ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }
      catch(e){ return null; }
    }
    return mem;
  }
  async function save(data){
    if (mode === "claude"){
      try{ await window.storage.set(KEY, JSON.stringify(data)); }catch(e){}
      return;
    }
    if (mode === "local"){
      try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){}
      return;
    }
    mem = data;
  }
  async function wipe(){
    if (mode === "claude"){ try{ await window.storage.delete(KEY); }catch(e){} return; }
    if (mode === "local"){ try{ localStorage.removeItem(KEY); }catch(e){} return; }
    mem = null;
  }
  return { detect, load, save, wipe, modeName: () => mode };
})();

/* ============ app state ============ */
let S = {
  prog: {},                                   // key -> {b,d,n,w}
  set: { lvl: "all", dir: "de", newN: 20 }    // settings
};
let saveTimer = null;
function persist(immediate){
  if (saveTimer){ clearTimeout(saveTimer); saveTimer = null; }
  const doSave = () => Store.save({ v: 1, prog: S.prog, set: S.set });
  if (immediate) doSave();
  else saveTimer = setTimeout(doSave, 1500);
}

/* ============ helpers ============ */
const $ = sel => document.querySelector(sel);
function el(tag, attrs, ...kids){
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs){
    if (k === "class") n.className = attrs[k];
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const kid of kids){
    if (kid == null) continue;
    n.appendChild(typeof kid === "string" ? document.createTextNode(kid) : kid);
  }
  return n;
}
function fold(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ß/g, "ss");
}
function inLevel(r, lvl){ return lvl === "all" || r[5] === lvl; }
function statusOf(r){
  const p = S.prog[keyOf(r)];
  if (!p) return "new";
  return p.b >= 5 ? "mastered" : "learning";
}
function levelStats(lvl){
  let neu = 0, learn = 0, mast = 0, due = 0;
  const now = Date.now();
  for (const r of WORDS){
    if (!inLevel(r, lvl)) continue;
    const p = S.prog[keyOf(r)];
    if (!p) neu++;
    else if (p.b >= 5){ mast++; if (p.d <= now) due++; }
    else { learn++; if (p.d <= now) due++; }
  }
  return { neu, learn, mast, due, total: neu + learn + mast };
}
function artSpan(r, cls){
  if (!r[1]) return null;
  return el("span", {class: (cls||"art") + " art " + r[1]}, r[1] + " ");
}

/* ============ tabs ============ */
let tab = "study";
let session = null;
const tabs = { study: "#tab-study", browse: "#tab-browse", data: "#tab-data" };
function setTab(t){
  tab = t;
  for (const k in tabs) $(tabs[k]).classList.toggle("on", k === t);
  render();
}

/* ============ study home ============ */
function chipRow(opts, cur, onPick){
  const c = el("div", {class:"chips"});
  for (const o of opts){
    c.appendChild(el("button", {
      class: "chip" + (o.v === cur ? " on" : ""),
      onclick: () => onPick(o.v)
    }, o.t));
  }
  return c;
}

function renderHome(root){
  const st = levelStats(S.set.lvl);

  root.appendChild(el("div", {class:"lbl"}, "Level"));
  root.appendChild(chipRow(
    [{v:"all",t:"All"},{v:1,t:"A1"},{v:2,t:"A2"},{v:3,t:"B1"}],
    S.set.lvl, v => { S.set.lvl = v; persist(); render(); }
  ));

  root.appendChild(el("div", {class:"lbl"}, "Direction"));
  root.appendChild(chipRow(
    [{v:"de",t:"DE → EN"},{v:"en",t:"EN → DE"}],
    S.set.dir, v => { S.set.dir = v; persist(); render(); }
  ));

  root.appendChild(el("div", {class:"lbl"}, "New cards per session"));
  root.appendChild(chipRow(
    [{v:10,t:"10"},{v:20,t:"20"},{v:50,t:"50"},{v:-1,t:"All"}],
    S.set.newN, v => { S.set.newN = v; persist(); render(); }
  ));

  const pct = st.total ? (st.mast / st.total * 100) : 0;
  const pctL = st.total ? (st.learn / st.total * 100) : 0;
  const stats = el("div", {class:"stats"},
    el("div", {class:"nums"},
      el("div", {class:"n due"},   el("b", null, String(st.due)),   el("span", null, "due now")),
      el("div", {class:"n"},       el("b", null, String(st.neu)),   el("span", null, "new")),
      el("div", {class:"n learn"}, el("b", null, String(st.learn)), el("span", null, "learning")),
      el("div", {class:"n mast"},  el("b", null, String(st.mast)),  el("span", null, "mastered"))
    ),
    el("div", {class:"bar"},
      el("i", {class:"m", style:"width:" + pct + "%"}),
      el("i", {class:"l", style:"width:" + pctL + "%"})
    )
  );
  root.appendChild(stats);

  const newAvail = Math.min(st.neu, S.set.newN === -1 ? st.neu : S.set.newN);
  const total = st.due + newAvail;
  const btn = el("button", {class:"start", onclick: startSession},
    total ? "Start session · " + total + " card" + (total === 1 ? "" : "s") : "All caught up");
  if (!total) btn.disabled = true;
  root.appendChild(btn);
  root.appendChild(el("div", {class:"hint"},
    total ? (st.due + " due review" + (st.due===1?"":"s") + " + " + newAvail + " new") :
    "No cards due in " + (S.set.lvl === "all" ? "any level" : LV[S.set.lvl]) + " right now. Come back later or switch level."));
}

/* ============ session ============ */
function startSession(){
  const now = Date.now();
  const due = [], fresh = [];
  for (const r of WORDS){
    if (!inLevel(r, S.set.lvl)) continue;
    const p = S.prog[keyOf(r)];
    if (!p) fresh.push(r);
    else if (p.d <= now) due.push(r);
  }
  due.sort((a,b) => S.prog[keyOf(a)].d - S.prog[keyOf(b)].d);
  const lim = S.set.newN === -1 ? fresh.length : S.set.newN;
  const queue = due.concat(fresh.slice(0, lim));
  if (!queue.length) return;
  session = { queue, i: 0, flipped: false, ok: 0, bad: 0, done: false, total: queue.length };
  render();
}

function grade(correct){
  const r = session.queue[session.i];
  const k = keyOf(r);
  let p = S.prog[k];
  if (!p) p = S.prog[k] = { b: 0, d: 0, n: 0, w: 0 };
  p.n++;
  if (correct){
    p.b = Math.min(p.b + 1, 5);
    p.d = Date.now() + INTERVALS[p.b];
    session.ok++;
  } else {
    p.b = 1;
    p.d = Date.now() + WRONG_DELAY;
    p.w++;
    session.bad++;
    const pos = Math.min(session.i + 5, session.queue.length);
    session.queue.splice(pos, 0, r);
    session.total++;
  }
  persist();
  session.i++;
  session.flipped = false;
  if (session.i >= session.queue.length){
    session.done = true;
    persist(true);
  }
  render();
}

function renderCardFaces(r){
  const de = el("div", null,
    el("div", {class:"word"}, artSpan(r), r[0]),
    r[2] ? el("div", {class:"plural"}, "Pl.: " + r[2]) : null,
    r[3] ? el("div", {class:"forms"}, r[3]) : null
  );
  const enSide = el("div", null,
    el("div", {class:"trans"}, r[4]),
    r[6] ? el("div", {class:"ex"},
      el("div", {class:"de"}, r[6]),
      r[7] ? el("div", {class:"en"}, r[7]) : null
    ) : null
  );
  const deBack = el("div", null,
    el("div", {class:"word"}, artSpan(r), r[0]),
    r[2] ? el("div", {class:"plural"}, "Pl.: " + r[2]) : null,
    r[3] ? el("div", {class:"forms"}, r[3]) : null,
    r[6] ? el("div", {class:"ex"},
      el("div", {class:"de"}, r[6]),
      r[7] ? el("div", {class:"en"}, r[7]) : null
    ) : null
  );
  return S.set.dir === "de" ? { front: de, back: enSide, fTag: "German", bTag: "English" }
                            : { front: el("div", null, el("div", {class:"trans"}, r[4])), back: deBack, fTag: "English", bTag: "German" };
}

function renderStudy(root){
  if (!session || session.done && !session.queue.length){ renderHome(root); return; }
  if (session.done){
    root.appendChild(el("div", {class:"done"},
      el("h2", null, "Session finished"),
      el("p", null, session.total + " cards reviewed"),
      el("div", {class:"nums"},
        el("div", {class:"ok"},  el("b", null, String(session.ok)),  "knew it"),
        el("div", {class:"bad"}, el("b", null, String(session.bad)), "missed")
      ),
      el("button", {class:"start", onclick: () => { session = null; startSession(); if (!session) render(); }}, "Next session"),
      el("button", {class:"reveal", onclick: () => { session = null; render(); }}, "Back to overview")
    ));
    return;
  }
  const r = session.queue[session.i];
  const faces = renderCardFaces(r);
  const pct = session.i / session.queue.length * 100;

  root.appendChild(el("div", {class:"study-top"},
    el("button", {class:"back", onclick: () => { session = null; persist(true); render(); }}, "‹ End"),
    el("span", {class:"count"}, (session.i + 1) + " / " + session.queue.length)
  ));
  root.appendChild(el("div", {class:"sbar"}, el("i", {style:"width:" + pct + "%"})));

  const card = el("div", {class:"fcard" + (session.flipped ? " flip" : ""), onclick: toggleFlip},
    el("div", {class:"face front"},
      el("span", {class:"tag"}, faces.fTag),
      el("span", {class:"lvltag"}, LV[r[5]]),
      el("div", {class:"ctr"}, faces.front, el("div", {class:"taphint"}, "tap to flip"))
    ),
    el("div", {class:"face back"},
      el("span", {class:"tag"}, faces.bTag),
      el("span", {class:"lvltag"}, LV[r[5]]),
      el("div", {class:"ctr"}, faces.back)
    )
  );
  root.appendChild(el("div", {class:"card3d"}, card));

  if (session.flipped){
    root.appendChild(el("div", {class:"grade"},
      el("button", {class:"no", onclick: e => { e.stopPropagation(); grade(false); }},
        "Didn’t know", el("small", null, "again in 10 min")),
      el("button", {class:"yes", onclick: e => { e.stopPropagation(); grade(true); }},
        "Knew it", el("small", null, nextDueLabel(r)))
    ));
  } else {
    root.appendChild(el("button", {class:"reveal", onclick: toggleFlip}, "Show answer"));
  }
}
function nextDueLabel(r){
  const p = S.prog[keyOf(r)];
  const b = Math.min((p ? p.b : 0) + 1, 5);
  const d = INTERVALS[b] / DAY;
  return "next in " + d + " day" + (d === 1 ? "" : "s");
}
function toggleFlip(){
  if (!session || session.done) return;
  session.flipped = !session.flipped;
  render();
}

/* ============ browse ============ */
let q = "", browseLvl = "all", shown = 100;
function renderBrowse(root){
  root.appendChild(el("input", {
    class:"search", type:"search", placeholder:"Search German or English…", value:q,
    oninput: e => { q = e.target.value; shown = 100; renderBrowseList(); }
  }));
  root.appendChild(el("div", {class:"lbl"}, "Level"));
  root.appendChild(chipRow(
    [{v:"all",t:"All"},{v:1,t:"A1"},{v:2,t:"A2"},{v:3,t:"B1"}],
    browseLvl, v => { browseLvl = v; shown = 100; renderBrowseList(); render(); }
  ));
  const holder = el("div", {id:"blist"});
  root.appendChild(holder);
  renderBrowseList();
}
function renderBrowseList(){
  const holder = $("#blist");
  if (!holder) return;
  holder.innerHTML = "";
  const f = fold(q.trim());
  const hits = [];
  for (const r of WORDS){
    if (!inLevel(r, browseLvl)) continue;
    if (f && fold(r[0]).indexOf(f) === -1 && fold(r[4]).indexOf(f) === -1) continue;
    hits.push(r);
  }
  holder.appendChild(el("div", {class:"count-line"}, hits.length + " words"));
  const list = el("div", {class:"wlist"});
  const dotCls = { "new":"", learning:"l", mastered:"m" };
  for (const r of hits.slice(0, shown)){
    list.appendChild(el("div", {class:"wrow"},
      el("span", {class:"dot " + dotCls[statusOf(r)]}),
      el("span", {class:"de"}, artSpan(r), r[0], r[2] ? el("span", {class:"pl"}, ", " + r[2]) : null),
      el("span", {class:"en"}, r[4]),
      el("span", {class:"lv"}, LV[r[5]])
    ));
  }
  if (hits.length > shown){
    list.appendChild(el("button", {class:"more", onclick: () => { shown += 200; renderBrowseList(); }},
      "Show more (" + (hits.length - shown) + " left)"));
  }
  holder.appendChild(list);
}

/* ============ data tab ============ */
function renderData(root){
  const counts = { all: levelStats("all"), 1: levelStats(1), 2: levelStats(2), 3: levelStats(3) };

  const exp = el("textarea", {readonly:"", placeholder:"Your progress JSON appears here"});
  const expBtn = el("button", {class:"btn", onclick: () => {
    exp.value = JSON.stringify({ v:1, prog:S.prog, set:S.set });
    exp.select();
  }}, "Export progress");
  root.appendChild(el("div", {class:"panel"},
    el("h3", null, "Export"),
    el("p", null, "Copy this JSON to back up your learning progress or move it to another device."),
    expBtn, exp
  ));

  const imp = el("textarea", {placeholder:"Paste exported JSON here"});
  const msg = el("div", {class:"msg"});
  const impBtn = el("button", {class:"btn", onclick: () => {
    try{
      const d = JSON.parse(imp.value);
      if (!d || typeof d.prog !== "object") throw new Error("bad");
      S.prog = d.prog || {};
      if (d.set) S.set = Object.assign(S.set, d.set);
      persist(true);
      msg.className = "msg ok"; msg.textContent = "Imported. " + Object.keys(S.prog).length + " card records restored.";
    }catch(e){
      msg.className = "msg err"; msg.textContent = "Couldn’t read that JSON.";
    }
  }}, "Import");
  root.appendChild(el("div", {class:"panel"},
    el("h3", null, "Import"),
    el("p", null, "Restores progress from an export. Replaces current progress."),
    imp, el("div", null, impBtn), msg
  ));

  const rmsg = el("div", {class:"msg"});
  function resetLvl(lvl, label){
    return el("button", {class:"btn warn", onclick: () => {
      if (!confirm("Reset progress for " + label + "? This cannot be undone.")) return;
      if (lvl === "all") S.prog = {};
      else for (const r of WORDS){ if (r[5] === lvl) delete S.prog[keyOf(r)]; }
      persist(true);
      rmsg.className = "msg ok"; rmsg.textContent = label + " progress cleared.";
      render();
    }}, label);
  }
  root.appendChild(el("div", {class:"panel"},
    el("h3", null, "Reset"),
    el("p", null, "Clear saved progress for one level or everything."),
    el("div", null, resetLvl(1,"A1"), resetLvl(2,"A2"), resetLvl(3,"B1"), resetLvl("all","Everything")),
    rmsg
  ));

  const modeTxt = {
    claude: "Progress is saved automatically in this Claude artifact and persists across sessions.",
    local: "Progress is saved automatically in this browser’s local storage on this device.",
    memory: "Storage unavailable here — progress lasts only for this page session. Use Export to keep it."
  };
  root.appendChild(el("div", {class:"storage-note"},
    modeTxt[Store.modeName()] + " · " + counts.all.total + " words (A1 " + counts[1].total + " · A2 " + counts[2].total + " · B1 " + counts[3].total + ")"
  ));
}

/* ============ render root ============ */
function render(){
  const root = $("#main");
  root.innerHTML = "";
  if (tab === "study") renderStudy(root);
  else if (tab === "browse") renderBrowse(root);
  else renderData(root);
}

/* ============ keyboard ============ */
document.addEventListener("keydown", e => {
  if (tab !== "study" || !session || session.done) return;
  if (e.target && (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT")) return;
  if (e.code === "Space" || e.key === "Enter"){ e.preventDefault(); toggleFlip(); }
  else if (session.flipped && (e.key === "1" || e.key === "ArrowLeft")) grade(false);
  else if (session.flipped && (e.key === "2" || e.key === "ArrowRight")) grade(true);
});

/* ============ boot ============ */
(async function(){
  await Store.detect();
  const saved = await Store.load();
  if (saved && saved.prog){ S.prog = saved.prog; if (saved.set) S.set = Object.assign(S.set, saved.set); }
  $("#tab-study").addEventListener("click", () => { setTab("study"); });
  $("#tab-browse").addEventListener("click", () => { setTab("browse"); });
  $("#tab-data").addEventListener("click", () => { setTab("data"); });
  $("#foot").textContent = "Vocabulary compiled from the official Goethe/ÖSD/telc certificate word lists (A1 · A2 · B1).";
  render();
})();
