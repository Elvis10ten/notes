t weekend? (Perfekt only)"},{k:"s",f:"Perfekt III \u2013 with sein",g:{t:"sein for movement & change",p:["Use sein instead of haben for change of location (gehen, fahren, fliegen, kommen) and change of state (aufstehen, einschlafen) + bleiben, sein, passieren.","Everything else takes haben. Rule of thumb: movement from A to B? \u2192 sein.","ich bin gegangen, du bist gefahren, wir sind geblieben."],e:["Sie ist nach Hause gegangen. \u2013 She went home.","Wir sind um 7 Uhr aufgestanden. \u2013 We got up at 7."]},q:[{t:1,q:"Sie ___ gestern nach Berlin gefahren.",o:["hat","ist","habt","sind"],a:1},{t:2,q:"Wir ___ gestern ins Kino gegangen.",a:["sind"]}],tut:"Perfekt with sein: tell the story of your last trip (Where to? How? What happened?)."},{k:"s",f:"Sentence bracket & word order",g:{t:"Verb in position 2, participle at the end",p:["Main clause: the conjugated verb is ALWAYS in position 2 \u2013 no matter what comes first.","The sentence bracket: habe/bin \u2026 participle at the very end.","Time before place: Ich war gestern (when) zu Hause (where)."],e:["Am Montag habe ich meine Oma besucht.","Gestern bin ich um 7 Uhr aufgestanden."]},q:[{t:1,q:"Which sentence is correct?",o:["Gestern ich habe Pizza gegessen.","Gestern habe ich Pizza gegessen.","Gestern habe Pizza ich gegessen.","Ich gestern habe Pizza gegessen."],a:1},{t:2,q:"Gestern ___ ich um 7 Uhr aufgestanden.",a:["bin"]}],ext:["\u{1F5E3}\uFE0F Record a 2-min monologue: my day yesterday \u2013 listen back & note 3 mistakes"]},{k:"s",f:"Pr\xE4teritum of sein & haben",g:{t:"war & hatte \u2013 short and natural",p:["For sein/haben, Germans almost always use the Pr\xE4teritum: ich war (not: bin gewesen), ich hatte (not: habe gehabt).","Forms: war, warst, war, waren, wart, waren \xB7 hatte, hattest, hatte, hatten, hattet, hatten.","Also essential: es gab (= there was/were)."],e:["Wo warst du gestern? \u2013 Ich war zu Hause.","Als Kind hatte ich einen Hund."]},q:[{t:2,q:"Als Kind ___ ich viele Freunde. (haben)",a:["hatte"]},{t:1,q:"Wo ___ du gestern Abend?",o:["bist","warst","hattest","wart"],a:1}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my last vacation (war/hatte + Perfekt)"],w:"6 sentences about your childhood using war/hatte."},{k:"s",f:"Akkusativ + f\xFCr, ohne, gegen, durch, um",g:{t:"Akkusativ review & prepositions",p:["Only masculine changes: der \u2192 den (einen, keinen, meinen). die/das stay the same.","These 5 prepositions ALWAYS take Akkusativ: f\xFCr, ohne, gegen, durch, um.","The question: Wen oder was? \u2192 Ich sehe den Mann."],e:["Das Geschenk ist f\xFCr meinen Bruder.","Wir gehen durch den Park."]},q:[{t:1,q:"Das Geschenk ist ___ meinen Bruder.",o:["f\xFCr","mit","von","zu"],a:0},{t:2,q:"Wir gehen ___ den Park. (through)",a:["durch"]}],tut:"Describe yesterday vs. today; tutor strictly enforces verb position 2."},{k:"r",f:"Weekly review & test",g:{t:"Week 1 recap",p:["Perfekt: haben/sein (position 2) + Partizip II (sentence end).","sein for movement & change: gegangen, gefahren, aufgestanden.","war/hatte instead of Perfekt for sein & haben."],e:[]},tut:"Weekly recap: speak freely about your week for 5 min (Perfekt + war/hatte). Tutor notes mistakes."},{k:"s",f:"Dativ \u2013 articles & pronouns",g:{t:"dem / der / dem / den + mir, dir, ihm \u2026",p:["Dativ articles: der\u2192dem, die\u2192der, das\u2192dem, plural\u2192den (+n on the noun: den Kindern).","Pronouns: mir, dir, ihm, ihr, ihm, uns, euch, ihnen/Ihnen.","The question: Wem?"],e:["Ich gebe dem Mann das Buch.","Kannst du mir helfen?"]},q:[{t:1,q:"Kannst du ___ helfen?",o:["mich","mir","ich","mein"],a:1},{t:2,q:"Das Handy geh\xF6rt ___ Bruder. (mein)",a:["meinem"]}],tut:"Describe your room; tutor asks Wo ist \u2026? (answers in Dativ).",w:"Describe your living room in 8 sentences (where things are \u2013 Dativ!)."},{k:"s",f:"Dativ verbs",g:{t:"helfen, gefallen, geh\xF6ren, danken, schmecken",p:["These verbs ALWAYS take Dativ: helfen, danken, gefallen, geh\xF6ren, schmecken, passen, gratulieren, antworten, glauben.","Der Film gef\xE4llt mir (not: mich).","Learn them as a block \u2013 they live in the Sprachbausteine section of the exam!"],e:["Der Film gef\xE4llt ihm nicht.","Wir danken dir f\xFCr die Hilfe."]},q:[{t:1,q:"Der Film gef\xE4llt ___ nicht.",o:["er","ihn","ihm","sein"],a:2},{t:2,q:"Wir danken ___ f\xFCr die Hilfe. (du)",a:["dir"]}],tut:"Dativ-verb game: Was gef\xE4llt dir? Wem geh\xF6rt was? Rapid-fire questions from your tutor."},{k:"s",f:"Dativ prepositions",g:{t:"mit, nach, aus, zu, von, bei, seit",p:["Memorize the chain: mit-nach-aus-zu-von-bei-seit \u2192 always Dativ!","Contractions: zu dem\u2192zum, zu der\u2192zur, bei dem\u2192beim, von dem\u2192vom.","seit + Dativ for duration: seit einem Jahr."],e:["Ich fahre mit dem Bus zur Arbeit.","Sie kommt aus der T\xFCrkei."]},q:[{t:2,q:"Ich fahre ___ dem Bus zur Arbeit.",a:["mit"]},{t:1,q:"Sie kommt ___ der T\xFCrkei.",o:["von","aus","nach","bei"],a:1}],tut:"Giving directions: tutor names places in your city, you explain the way."},{k:"s",f:"Two-way prepositions I \u2013 Wo? + Dativ",g:{t:"in, an, auf, \xFCber, unter, vor, hinter, neben, zwischen",p:["These 9 prepositions switch case. Position (Wo?) \u2192 Dativ.","Position verbs: stehen, liegen, h\xE4ngen, sitzen \u2192 Dativ.","Das Bild h\xE4ngt an der Wand. Die Katze liegt unter dem Tisch."],e:["Die Lampe h\xE4ngt \xFCber dem Tisch.","Das Buch liegt auf dem Regal."]},q:[{t:1,q:"Die Lampe h\xE4ngt ___ dem Tisch.",o:["\xFCber","durch","f\xFCr","ohne"],a:0},{t:2,q:"Das Bild h\xE4ngt ___ der Wand.",a:["an"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my apartment \u2013 describe each room (what is where?)"]},{k:"s",f:"Two-way prepositions II \u2013 Wohin? + Akkusativ",g:{t:"Direction = Akkusativ \xB7 stellen/legen/h\xE4ngen",p:["Movement/direction (Wohin?) \u2192 Akkusativ: Ich stelle die Vase auf den Tisch.","Learn the pairs: stellen\u2192stehen, legen\u2192liegen, (sich) setzen\u2192sitzen, h\xE4ngen\u2192h\xE4ngen.","Wo? = Dativ \xB7 Wohin? = Akkusativ \u2013 THE classic Sprachbausteine trap."],e:["Ich stelle die Vase auf den Tisch.","Er legt das Buch in die Tasche."]},q:[{t:1,q:"Ich stelle die Vase ___ Tisch.",o:["auf den","auf dem","auf der","auf das"],a:0},{t:2,q:"Er legt das Buch in ___ Tasche. (die)",a:["die"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my neighborhood \u2013 what is where?"],w:"Short message to a friend: directions to your home (6 sentences)."},{k:"s",f:"Places & directions: zu, nach, in",g:{t:"Wohin gehst du?",p:["nach: cities & countries without article (nach Berlin, nach Italien) + nach Hause.","zu: people & places/buildings (zum Arzt, zur Schule, zu Maria).","in + Akkusativ when you go inside (ins Kino, in die Stadt, in die Schweiz)."],e:["Wie komme ich zum Bahnhof?","Wir fahren nach Italien \u2013 genauer: in die Toskana."]},q:[{t:1,q:"Wie komme ich ___ Bahnhof?",o:["zum","nach","ins","zur"],a:0},{t:2,q:"Gehen Sie an der Ampel nach ___ . (left)",a:["links"]}],tut:"Apartment-hunt roleplay: you question the landlord (rent? floor? heating? extra costs?)."},{k:"r",f:"Weekly review & test",g:{t:"Week 2 recap",p:["Dativ: dem/der/dem/den+n \xB7 mir, dir, ihm, ihr \u2026","mit-nach-aus-zu-von-bei-seit \u2192 always Dativ.","Wo? \u2192 Dativ \xB7 Wohin? \u2192 Akkusativ (two-way prepositions)."],e:[]},tut:"Weekly recap + tutor dictates 5 sentences with two-way prepositions (you write, then correct together)."},{k:"s",f:"weil & denn",g:{t:"Giving reasons",p:["weil = subordinate clause \u2192 verb goes to the END: \u2026, weil ich krank bin.","denn = main clause \u2192 verb stays in position 2: \u2026, denn ich bin krank.","You need weil constantly in the speaking exam: justify everything!"],e:["Ich bleibe zu Hause, weil ich krank bin.","Ich lerne Deutsch, denn ich wohne in Berlin."]},q:[{t:1,q:"Ich bleibe zu Hause, ___ ich krank bin.",o:["denn","weil","deshalb","und"],a:1},{t:2,q:"Er lernt Deutsch, weil er in Berlin ___ . (arbeiten)",a:["arbeitet"]}],tut:"weil discussion: Why are you learning German? Give 5 reasons in full sentences."},{k:"s",f:"dass clauses",g:{t:"Opinions & statements",p:["After Ich glaube/denke/finde/wei\xDF/hoffe + dass \u2192 verb to the end.","Never forget the comma before dass.","This is the skeleton of Speaking Part 2 (giving your opinion)."],e:["Ich glaube, dass das Wetter morgen besser wird.","Sie sagt, dass sie keine Zeit hat."]},q:[{t:1,q:"Sie sagt, ___ sie keine Zeit hat.",o:["weil","dass","ob","denn"],a:1},{t:2,q:"Ich glaube, dass das Wetter morgen besser ___ . (werden)",a:["wird"]}],tut:"Opinion ping-pong: tutor names topics, you answer with Ich finde/glaube, dass \u2026",w:"Your opinion in 6 sentences: working from home \u2013 good or bad? (use weil/dass)"},{k:"s",f:"wenn",g:{t:"Conditions & repeated time",p:["wenn = subordinate clause (verb to the end): Wenn es regnet, nehme ich den Bus.","If the wenn clause comes first, the main clause starts with the verb.","wenn also means whenever (repeated events)."],e:["Wenn es regnet, nehme ich den Bus.","Ich besuche dich, wenn ich Zeit habe."]},q:[{t:1,q:"___ es regnet, nehme ich den Bus.",o:["Wenn","Weil","Dass","Ob"],a:0},{t:2,q:"Wenn ich Zeit ___ , besuche ich dich. (haben)",a:["habe"]}],tut:"wenn chains: Was machst du, wenn \u2026? (10 rapid questions from your tutor)"},{k:"s",f:"Modal verbs in the Pr\xE4teritum",g:{t:"musste, konnte, wollte, durfte, sollte",p:["The past of modal verbs: NEVER Perfekt, always Pr\xE4teritum.","k\xF6nnen\u2192konnte, m\xFCssen\u2192musste, wollen\u2192wollte, d\xFCrfen\u2192durfte, sollen\u2192sollte \u2013 no umlaut!","Ich konnte gestern nicht kommen, weil ich arbeiten musste."],e:["Als Kind konnte ich nicht schwimmen.","Wir mussten gestern lange arbeiten."]},q:[{t:1,q:"Als Kind ___ ich nicht schwimmen.",o:["kann","konnte","k\xF6nnte","gekonnt"],a:1},{t:2,q:"Wir ___ gestern lange arbeiten. (m\xFCssen)",a:["mussten"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my dream job \u2013 and what I wanted to be as a kid"]},{k:"s",f:"deshalb & trotzdem",g:{t:"Linking results & contrasts",p:["deshalb (= darum, deswegen): logical result. trotzdem: unexpected contrast.","Both take position 1 \u2192 the verb comes immediately after.","Instantly makes your writing & speaking sound B1-level."],e:["Es regnet, deshalb bleiben wir zu Hause.","Er ist m\xFCde, trotzdem geht er nicht ins Bett."]},q:[{t:1,q:"Es regnet, ___ bleiben wir zu Hause.",o:["weil","deshalb","trotzdem","dass"],a:1},{t:2,q:"Er ist m\xFCde, ___ geht er nicht ins Bett.",a:["trotzdem"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: why I am learning German \u2013 using deshalb & weil"]},{k:"s",f:"ob & indirect questions",g:{t:"Ich wei\xDF nicht, ob/wann/wo \u2026",p:["Yes/no question made indirect \u2192 ob: Kommt er? \u2192 Ich wei\xDF nicht, ob er kommt.","W-question made indirect \u2192 keep the W-word: Ich wei\xDF nicht, wo er wohnt.","Verb to the end. Polite version: Wissen Sie, ob \u2026?"],e:["Wei\xDFt du, ob der Supermarkt heute ge\xF6ffnet ist?","Ich wei\xDF nicht, wo er wohnt."]},q:[{t:2,q:"Wei\xDFt du, ___ der Supermarkt heute ge\xF6ffnet ist?",a:["ob"]},{t:1,q:"Ich wei\xDF nicht, ___ er wohnt.",o:["ob","dass","wo","weil"],a:2}],tut:"Job-interview light: talk about your work & daily routine (use modal verbs).",w:"Short email: you cannot make an appointment \u2013 apologize + suggest a new time (6 sentences)."},{k:"c",f:"CHECKPOINT 1 \u2013 A2 core",g:{t:"Checkpoint 1: Is the foundation solid?",p:["Today you prove Phase 1 stuck: Perfekt, Dativ, subordinate clauses, modal Pr\xE4teritum.","Quiz below: aim for \u2265 80%. Under 60%? Redo your weakest lesson this weekend.","Only tick the self-checks if they are genuinely true."],e:[]},q:[{t:1,q:"Gestern ___ wir ins Restaurant gegangen.",o:["haben","sind","waren","ist"],a:1},{t:2,q:"Kannst du ___ Schwester helfen? (meine)",a:["meiner"]},{t:1,q:"Er bleibt im Bett, ___ er Fieber hat.",o:["denn","deshalb","weil","trotzdem"],a:2},{t:2,q:"Als Kind ___ ich kein Gem\xFCse essen. (wollen)",a:["wollte"]}],tut:"CHECKPOINT spoken: 8 min free talk about work & daily life; tutor grades by telc criteria.",ext:["\u2705 Self-check: I can talk about yesterday for 2 min (Perfekt)","\u2705 Self-check: I can say where things are (Dativ)","\u2705 Self-check: I can give reasons (weil/dass)"]},{k:"s",f:"Reflexive verbs (Akkusativ)",g:{t:"sich freuen, sich interessieren \u2026",p:["Akkusativ reflexive pronouns: mich, dich, sich, uns, euch, sich.","Top verbs: sich freuen auf/\xFCber, sich interessieren f\xFCr, sich treffen, sich f\xFChlen, sich \xE4rgern, sich erinnern an.","Position: right after the conjugated verb."],e:["Ich freue mich auf das Wochenende.","Er interessiert sich f\xFCr Musik."]},q:[{t:2,q:"Ich freue ___ auf das Wochenende.",a:["mich"]},{t:1,q:"Er interessiert ___ f\xFCr Musik.",o:["ihn","sich","ihm","er"],a:1}],tut:"Reflexive interview: Worauf freust du dich? Wof\xFCr interessierst du dich? (full sentences)"},{k:"s",f:"Reflexive with Dativ + body",g:{t:"Ich wasche mir die H\xE4nde",p:["With a body part/object \u2192 the reflexive pronoun goes DATIV: mir, dir, sich, uns, euch, sich.","Only ich/du change (mir/dir) \u2013 the rest looks like the Akkusativ forms.","Useful at the doctor: Ich habe mir den Arm gebrochen."],e:["Ich wasche mir die H\xE4nde.","Sie putzt sich die Z\xE4hne."]},q:[{t:2,q:"Ich wasche ___ die H\xE4nde. (Dativ!)",a:["mir"]},{t:1,q:"Sie putzt ___ die Z\xE4hne.",o:["sich","ihr","sie","ihm"],a:0}],tut:"Doctor-visit roleplay: describe symptoms, book an appointment, ask follow-ups."},{k:"s",f:"Comparative",g:{t:"gr\xF6\xDFer als, lieber, besser",p:["Adjective + er: klein\u2192kleiner. Often with umlaut: alt\u2192\xE4lter, gro\xDF\u2192gr\xF6\xDFer, jung\u2192j\xFCnger.","Irregular: gut\u2192besser, viel\u2192mehr, gern\u2192lieber.","Compare with als: Mein Bruder ist \xE4lter als ich."],e:["Mein Bruder ist \xE4lter als ich.","Ich trinke lieber Tee als Kaffee."]},q:[{t:1,q:"Mein Bruder ist ___ als ich.",o:["alt","\xE4lter","am \xE4ltesten","mehr alt"],a:1},{t:2,q:"Ich trinke ___ Tee als Kaffee. (gern)",a:["lieber"]}],tut:"Comparisons: your city vs. a German city (gr\xF6\xDFer als / mehr \u2026 als).",w:"Compare two cities in 8 sentences (comparative + als)."},{k:"s",f:"Superlative",g:{t:"am schnellsten / der h\xF6chste",p:["After a verb: am + -sten \u2192 Sie l\xE4uft am schnellsten.","Before a noun: der/die/das + -ste \u2192 der h\xF6chste Berg.","Irregular: am besten, am meisten, am liebsten; use -esten after -t/-d."],e:["Der Mount Everest ist der h\xF6chste Berg der Welt.","Sie l\xE4uft am schnellsten."]},q:[{t:2,q:"Der Mount Everest ist der ___ Berg der Welt. (hoch)",a:["h\xF6chste","hoechste"]},{t:1,q:"Sie l\xE4uft am ___ .",o:["schneller","schnellsten","schnellste","schnell"],a:1}],ext:["\u{1F5E3}\uFE0F 2-min monologue: how I stay healthy (use mehr/weniger/lieber)"]},{k:"s",f:"so \u2026 wie & als",g:{t:"genauso gro\xDF wie",p:["Equality: (genau)so + adjective + wie: Er ist so gro\xDF wie sein Vater.","Inequality: comparative + als.","Mixing up wie/als is a favorite Sprachbausteine trap!"],e:["Er ist genauso gro\xDF wie sein Vater.","Berlin ist gr\xF6\xDFer als M\xFCnchen."]},q:[{t:1,q:"Er ist genauso gro\xDF ___ sein Vater.",o:["als","wie","so","von"],a:1},{t:2,q:"Berlin ist gr\xF6\xDFer ___ M\xFCnchen.",a:["als"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: sport & exercise in my daily life"]},{k:"s",f:"Imperative",g:{t:"Nimm! Nehmt! Nehmen Sie!",p:["du: stem without -st, no du: Nimm! Geh! Sprich! (the e\u2192i/ie change stays).","ihr: normal ihr-form without the pronoun: Nehmt! \xB7 Sie: verb + Sie: Nehmen Sie!","Add bitte to soften \u2013 constant at the doctor & in instructions."],e:["\xD6ffne bitte das Fenster!","Nehmen Sie zweimal t\xE4glich eine Tablette!"]},q:[{t:1,q:"(du) ___ bitte das Fenster!",o:["\xD6ffnest","\xD6ffne","\xD6ffnen","Ge\xF6ffnet"],a:1},{t:2,q:"___ Sie zweimal t\xE4glich eine Tablette! (nehmen)",a:["nehmen"]}],tut:"Tutor names problems (headache, stress, no money) \u2013 you give advice in the imperative."},{k:"r",f:"Weekly review & test",g:{t:"Week 4 recap",p:["Reflexives: mich/dich/sich \u2026 + mir/dir with body parts.","Comparative + als \xB7 genauso \u2026 wie \xB7 am -sten.","Imperative: Nimm! Nehmt! Nehmen Sie!"],e:[]},tut:"Weekly recap + spoken superlative quiz (Was ist am besten/gr\xF6\xDFten/teuersten?)."},{k:"s",f:"w\xFCrde + infinitive",g:{t:"Polite & hypothetical",p:["w\xFCrde (w\xFCrdest, w\xFCrden \u2026) + infinitive at the end = Konjunktiv II for almost every verb.","Polite request: W\xFCrdest du mir helfen? \xB7 Wish: Ich w\xFCrde gern reisen.","THE soft skill for the speaking exam \u2013 instantly sounds more polite."],e:["W\xFCrdest du mir bitte helfen?","Ich w\xFCrde gern nach Japan reisen."]},q:[{t:2,q:"___ du mir bitte helfen? (w\xFCrden)",a:["w\xFCrdest","wuerdest"]},{t:1,q:"Ich ___ gern nach Japan reisen.",o:["werde","w\xFCrde","will","wurde"],a:1}],tut:"Polite requests: caf\xE9 & hotel roleplay \u2013 phrase everything with w\xFCrde/k\xF6nnte."},{k:"s",f:"h\xE4tte, w\xE4re, k\xF6nnte",g:{t:"The big three",p:["haben\u2192h\xE4tte, sein\u2192w\xE4re, k\xF6nnen\u2192k\xF6nnte (their own forms \u2013 no w\xFCrde needed).","Ordering & wishing: Ich h\xE4tte gern \u2026 \xB7 Asking politely: K\xF6nnten Sie \u2026?","W\xE4re es m\xF6glich, \u2026? = gold in letters and on the phone."],e:["Ich h\xE4tte gern einen Kaffee.","K\xF6nnten Sie mir bitte sagen, wie sp\xE4t es ist?"]},q:[{t:1,q:"___ Sie mir bitte sagen, wo der Bahnhof ist?",o:["Konnten","K\xF6nnten","K\xF6nnt","Konntet"],a:1},{t:2,q:"Ich ___ gern einen Kaffee. (haben)",a:["h\xE4tte","haette"]}],tut:"Wish list: Was h\xE4ttest du gern? Wohin w\xFCrdest du reisen, wenn alles m\xF6glich w\xE4re?",w:"5 wishes with Ich w\xFCrde gern \u2026 + a reason with weil."},{k:"s",f:"Advice & unreal wenn",g:{t:"Du solltest \u2026 / Wenn ich \u2026 w\xE4re",p:["Advice: sollte + infinitive: Du solltest mehr schlafen.","Unreal condition: Wenn ich reich w\xE4re, w\xFCrde ich \u2026 (both halves in Konjunktiv II).","Exam formula: An deiner Stelle w\xFCrde ich \u2026"],e:["Du solltest mehr schlafen.","Wenn ich reich w\xE4re, w\xFCrde ich ein Haus kaufen."]},q:[{t:1,q:"Du ___ mehr Wasser trinken.",o:["solltest","sollten","w\xFCrdest sollen","sollte"],a:0},{t:2,q:"Wenn ich reich ___ , w\xFCrde ich ein Haus kaufen. (sein)",a:["w\xE4re","waere"]}],tut:"Consulting: your tutor wants to move to Germany \u2013 give 5 pieces of advice with sollte/w\xFCrde."},{k:"s",f:"Relative clauses \u2013 Nominativ",g:{t:"der Mann, der \u2026",p:["The relative pronoun mostly looks like the definite article: der/die/das (+ plural die).","Verb to the end: Das ist der Mann, der nebenan wohnt.","Gender comes from the noun before; case comes from the job inside the clause."],e:["Das ist der Mann, der nebenan wohnt.","Ich habe eine Freundin, die in Wien lebt."]},q:[{t:1,q:"Das ist der Mann, ___ nebenan wohnt.",o:["den","der","dem","das"],a:1},{t:2,q:"Ich habe eine Freundin, ___ in Wien lebt.",a:["die"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my dream trip \u2013 entirely in Konjunktiv II!"]},{k:"s",f:"Relative clauses \u2013 Akkusativ & Dativ",g:{t:"den ich sehe / dem ich helfe",p:["Akkusativ: den/die/das \u2013 Der Film, den wir gesehen haben \u2026","Dativ: dem/der/dem/denen \u2013 der Kollege, dem ich oft helfe.","Trick: rebuild the sentence: Ich habe DEN Film gesehen \u2192 den."],e:["Der Film, den wir gestern gesehen haben, war toll.","Das ist der Kollege, dem ich oft helfe."]},q:[{t:1,q:"Der Film, ___ wir gestern gesehen haben, war toll.",o:["der","den","dem","das"],a:1},{t:2,q:"Das ist der Kollege, ___ ich oft helfe. (helfen + Dativ!)",a:["dem"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: a trip that went wrong (work in relative clauses)"],w:"Describe your dream apartment using at least 4 relative clauses."},{k:"s",f:"Relative clauses with prepositions",g:{t:"die Stadt, in der ich wohne",p:["Preposition + relative pronoun: \u2026, in der ich wohne / \u2026, mit dem ich fahre.","The preposition decides the case (mit\u2192Dativ, f\xFCr\u2192Akkusativ).","First learn to recognize them \u2013 producing them comes with practice."],e:["Die Stadt, in der ich wohne, ist klein.","Der Bus, mit dem ich fahre, kommt gleich."]},q:[{t:1,q:"Die Stadt, in ___ ich wohne, ist klein.",o:["die","der","dem","das"],a:1},{t:2,q:"Der Bus, mit ___ ich fahre, kommt gleich.",a:["dem"]}],tut:"Describe people & places with relative clauses: Das ist die Stadt, die \u2026"},{k:"r",f:"Weekly review & test",g:{t:"Week 5 recap",p:["w\xFCrde/h\xE4tte/w\xE4re/k\xF6nnte + sollte for advice.","Relative clauses: der/den/dem \u2013 gender from the noun, case from the clause.","Wenn ich \u2026 w\xE4re, w\xFCrde ich \u2026"],e:[]},tut:"Tell a travel story freely \u2013 tutor counts your relative clauses (target: 5+)."},{k:"s",f:"Passive \u2013 present",g:{t:"Hier wird Deutsch gesprochen",p:["werden (position 2) + Partizip II (end): Das Brot wird gebacken.","Focus on the action, not the person doing it.","Typical for signs, instructions, exam reading texts."],e:["Das Brot wird jeden Morgen frisch gebacken.","Hier wird Deutsch gesprochen."]},q:[{t:2,q:"Das Brot ___ jeden Morgen frisch gebacken.",a:["wird"]},{t:1,q:"Hier ___ Deutsch gesprochen.",o:["ist","wird","hat","werden"],a:1}],tut:"Describe processes in the passive: Wie wird Kaffee gemacht? Wie wird Brot gebacken?"},{k:"s",f:"Passive \u2013 Pr\xE4teritum + von",g:{t:"wurde gebaut \u2013 by whom?",p:["Past: wurde/wurden + Partizip II: Das Haus wurde 1950 gebaut.","Name the doer with von + Dativ: \u2026 wurde von meiner Chefin geschrieben.","Reading texts (history, news) are full of this."],e:["Das Haus wurde 1950 gebaut.","Der Brief wurde von meiner Chefin geschrieben."]},q:[{t:1,q:"Das Haus ___ 1950 gebaut.",o:["wird","wurde","war","ist"],a:1},{t:2,q:"Der Brief wurde ___ meiner Chefin geschrieben.",a:["von"]}],tut:"Complaint roleplay: return a broken product (politely, with Konjunktiv II!).",w:"Complaint email: a product is broken, you want to exchange it (8 sentences, polite)."},{k:"s",f:"Genitiv",g:{t:"das Auto meines Vaters",p:["Possession: des/der/des + plural der. Masculine & neuter add -(e)s to the noun: des Vaters, des Kindes.","Feminine & plural: just der: die Tasche der Lehrerin.","Genitiv prepositions: wegen, w\xE4hrend, trotz (wegen des Wetters)."],e:["Das ist das Auto meines Vaters.","Wegen des Wetters bleiben wir zu Hause."]},q:[{t:1,q:"Wegen ___ Wetters bleiben wir zu Hause.",o:["dem","des","der","den"],a:1},{t:2,q:"Das ist die Tasche ___ Lehrerin.",a:["der"]}],tut:"Smartphones & tech: explain which apps you use and what for."},{k:"s",f:"Word formation",g:{t:"-ung, -bar, -los, un-",p:["Verb \u2192 noun with -ung (always die): wohnen\u2192die Wohnung, pr\xFCfen\u2192die Pr\xFCfung.","-bar = possible (trinkbar) \xB7 -los = without (arbeitslos) \xB7 un- = opposite (unfreundlich).","A reading superpower: decode unknown words instead of looking them up."],e:["pr\xFCfen \u2192 die Pr\xFCfung, anmelden \u2192 die Anmeldung","Das Wasser ist trinkbar. Er ist arbeitslos."]},q:[{t:1,q:"Which noun comes from pr\xFCfen?",o:["der Pr\xFCf","die Pr\xFCfung","das Pr\xFCfnis","die Pr\xFCfe"],a:1},{t:2,q:"Das Wasser kann man trinken: Es ist trink___ .",a:["bar"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: shopping online \u2013 pros and cons"]},{k:"s",f:"Two objects: Dativ before Akkusativ",g:{t:"Ich gebe dem Mann das Buch",p:["geben, schenken, zeigen, schicken, erkl\xE4ren, bringen: person (Dativ) + thing (Akkusativ).","Rule: Dativ before Akkusativ \u2013 unless the thing is a pronoun: Ich gebe es ihm.","Sprachbausteine love these verbs."],e:["Ich schenke meiner Mutter Blumen.","Kannst du mir das Foto schicken?"]},q:[{t:2,q:"Ich schenke ___ Mutter Blumen. (meine)",a:["meiner"]},{t:1,q:"Kannst du ___ das Foto schicken?",o:["mich","mir","ich","mein"],a:1}],ext:["\u{1F5E3}\uFE0F 2-min monologue: me and my phone \u2013 what gets done with it? (practice the passive!)"],w:"6 sentences: How is your favorite dish made? (passive)"},{k:"s",f:"Sprachbausteine strategy",g:{t:"Cracking the telc Sprachbausteine section",p:["Part 1: 10 grammar gaps (a/b/c) in a letter. Part 2: 10 gaps, 15 words to choose from.","Strategy: read the whole sentence, watch for case signals (prepositions!) and verb position.","Part 2: fill the gaps you are sure of first, solve the rest by elimination."],e:["Vielen Dank f\xFCr Ihre schnelle Antwort.","Ich freue mich auf deine Antwort."]},q:[{t:1,q:"Vielen Dank ___ Ihre schnelle Antwort.",o:["\xFCber","f\xFCr","auf","von"],a:1},{t:2,q:"Ich freue mich ___ deine Antwort. (future!)",a:["auf"]}],tut:"First telc speaking simulation, Part 1: getting to know each other (origin, job, hobbies, languages)."},{k:"c",f:"CHECKPOINT 2 \u2013 Halftime",g:{t:"Checkpoint 2: Halftime!",p:["A2 is wrapped up; the B1 structures are underway.","Quiz below: aim for \u2265 75%. Note error topics in your notes.","From here, every week counts double \u2013 keep the pace!"],e:[]},q:[{t:2,q:"Die E-Mail ___ gestern geschickt. (passive, Pr\xE4teritum)",a:["wurde"]},{t:1,q:"Das ist das Auto ___ Nachbarn.",o:["des","dem","der","den"],a:0},{t:1,q:"Ich ___ gern mehr Zeit.",o:["h\xE4tte","habe gern","w\xE4re","w\xFCrde"],a:0},{t:2,q:"Der Film, ___ ich gesehen habe, war langweilig.",a:["den"]}],tut:"CHECKPOINT: tutor quizzes Sprachbausteine out loud + honest halftime feedback round.",ext:["\u2705 Self-check: I can ask & advise politely (Konjunktiv II)","\u2705 Self-check: I can describe things with relative clauses","\u2705 Self-check: I can describe a process in the passive"]},{k:"s",f:"Pr\xE4teritum \u2013 strong verbs (reading!)",g:{t:"ging, kam, sah, gab, stand",p:["Texts & stories run on the Pr\xE4teritum. You must RECOGNIZE it \u2013 when speaking, Perfekt is enough.","Top forms: gehen\u2192ging, kommen\u2192kam, sehen\u2192sah, geben\u2192gab, stehen\u2192stand, fahren\u2192fuhr, nehmen\u2192nahm, finden\u2192fand.","es gab (= there was/were) is extremely common."],e:["Er kam gestern sp\xE4t nach Hause.","Fr\xFCher gab es hier einen Markt."]},q:[{t:1,q:"Er ___ gestern sp\xE4t nach Hause. (kommen, Pr\xE4teritum)",o:["kommte","kam","gekommen","k\xE4me"],a:1},{t:2,q:"Fr\xFCher ___ es hier einen Markt. (geben)",a:["gab"]}],tut:"Tell a childhood memory in the Pr\xE4teritum (war, ging, kam, hatte \u2026)."},{k:"s",f:"als vs. wenn",g:{t:"One time in the past? \u2192 als",p:["als: ONE event/period in the past: Als ich klein war \u2026","wenn: repeated (whenever) or present/future.","A classic exam trap \u2013 remember: als = one-time + past."],e:["Als wir letztes Jahr in Rom waren, war es hei\xDF.","Immer wenn ich ihn sehe, lacht er."]},q:[{t:1,q:"___ ich klein war, wohnten wir in K\xF6ln.",o:["Wenn","Als","Ob","W\xE4hrend"],a:1},{t:2,q:"___ wir letztes Jahr in Rom waren, war es sehr hei\xDF.",a:["als"]}],tut:"Als-ich-klein-war stories: 5 memories, each one starting with als.",w:"A childhood memory in 8 sentences (als + war/hatte; Perfekt elsewhere is fine)."},{k:"s",f:"bevor, nachdem, w\xE4hrend",g:{t:"Expressing sequence",p:["bevor (before), nachdem (after), w\xE4hrend (at the same time) \u2013 all send the verb to the end.","After nachdem the clause is usually in the past: Nachdem ich gegessen hatte, \u2026","w\xE4hrend also works as a preposition + Genitiv: w\xE4hrend der Arbeit."],e:["Wasch dir die H\xE4nde, bevor du isst!","W\xE4hrend ich fr\xFChst\xFCcke, lese ich Zeitung."]},q:[{t:1,q:"___ ich fr\xFChst\xFCcke, lese ich Zeitung.",o:["W\xE4hrend","Bevor","Nachdem","Bis"],a:0},{t:2,q:"Wasch dir die H\xE4nde, ___ du isst!",a:["bevor"]}],tut:"Link your daily routine with bevor/nachdem/w\xE4hrend \u2013 tutor stops you at every mistake."},{k:"s",f:"seit & bis",g:{t:"Time spans: seit, bis, vor",p:["seit + Dativ: still ongoing \u2192 present tense!: Ich lerne seit drei Monaten Deutsch.","bis: endpoint: Bleib hier, bis ich zur\xFCckkomme.","vor + Dativ = ago: vor zwei Jahren."],e:["Ich lerne seit drei Monaten Deutsch.","Bleib hier, bis ich zur\xFCckkomme!"]},q:[{t:1,q:"Ich lerne ___ drei Monaten Deutsch.",o:["seit","vor","bis","f\xFCr"],a:0},{t:2,q:"Bleib hier, ___ ich zur\xFCckkomme!",a:["bis"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: the weather in my country \u2013 using w\xE4hrend/wenn"]},{k:"s",f:"Infinitive with zu",g:{t:"Ich habe vergessen, \u2026 zu \u2026",p:["After vergessen, versuchen, anfangen, aufh\xF6ren, hoffen, vorhaben, Lust haben, wichtig/schwer sein: comma + zu + infinitive at the end.","Separable verbs put zu in the middle \u2192 anzurufen, einzukaufen.","After modal verbs & gehen/sehen/h\xF6ren: NO zu."],e:["Ich habe vergessen, die T\xFCr zu schlie\xDFen.","Es ist wichtig, jeden Tag zu \xFCben."]},q:[{t:2,q:"Ich habe vergessen, die T\xFCr ___ schlie\xDFen.",a:["zu"]},{t:1,q:"Es ist wichtig, jeden Tag ___ \xFCben.",o:["zu","f\xFCr","um","damit"],a:0}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my school days (als + Pr\xE4teritum)"],w:"Why are you learning German? 5 sentences with um \u2026 zu / damit."},{k:"s",f:"um \u2026 zu vs. damit",g:{t:"Goals & intentions",p:["Same subject \u2192 um \u2026 zu + infinitive: Ich lerne Deutsch, um hier zu arbeiten.","Different subjects \u2192 damit + clause: Sie spricht laut, damit alle sie verstehen.","A must-have structure for Speaking Part 2 (justifications!)."],e:["Ich lerne Deutsch, um in Deutschland zu arbeiten.","Sie spricht laut, damit alle sie verstehen."]},q:[{t:1,q:"Ich lerne Deutsch, ___ in Deutschland zu arbeiten.",o:["damit","um","f\xFCr","weil"],a:1},{t:2,q:"Sie spricht laut, ___ alle sie verstehen.",a:["damit"]}],tut:"Environment discussion: Was tust du, um die Umwelt zu sch\xFCtzen? (force um\u2026zu)"},{k:"r",f:"Weekly review & test",g:{t:"Week 7 recap",p:["Recognize the Pr\xE4teritum: ging, kam, gab, stand, fuhr.","als (one-time, past) vs. wenn (repeated).","zu-infinitive \xB7 um\u2026zu (same subject) vs. damit."],e:[]},tut:"Weekly recap: tutor mixes Pr\xE4teritum & Perfekt questions \u2013 you answer correctly."},{k:"s",f:"Adjective endings after der/die/das",g:{t:"der rote Mantel, den roten Mantel",p:["After the definite article there are only two endings: -e or -en.","-e in the Nominativ singular (der rote Mantel) AND in the Akkusativ feminine/neuter (die rote Tasche, das rote Auto). Everything else: -en.","Mnemonic: after der/die/das it is -e on top, -en everywhere else."],e:["Der rote Mantel gef\xE4llt mir.","Ich nehme den schwarzen Kaffee."]},q:[{t:2,q:"Der rot___ Mantel gef\xE4llt mir.",a:["e"]},{t:1,q:"Ich nehme den schwarz___ Kaffee.",o:["-e","-en","-es","-er"],a:1}],tut:"Describe outfits & objects in the room with adjective endings (der blaue \u2026, die kleine \u2026)."},{k:"s",f:"Adjective endings after ein/kein/mein",g:{t:"ein interessantes Buch",p:["After ein-words the adjective shows the gender: ein roter Mantel (m), eine nette Frau (f), ein interessantes Buch (n).","Akkusativ masculine: einen roten Mantel; feminine & neuter stay like the Nominativ. Dativ & plural: -en.","70% accuracy is plenty for B1 \u2013 patterns beat perfection."],e:["Das ist ein interessantes Buch.","Sie hat eine nette Schwester."]},q:[{t:1,q:"Das ist ein interessant___ Buch.",o:["-er","-e","-es","-en"],a:2},{t:2,q:"Sie hat eine nett___ Schwester.",a:["e"]}],tut:"Expressing feelings: When are you proud/disappointed/nervous? Tell real situations."},{k:"s",f:"Adjectives without an article",g:{t:"frisches Brot, kaltes Wasser",p:["With no article, the adjective takes over the article ending: frisches Brot (das), guter Kaffee (der), kalte Milch (die).","Common with food, materials, plurals: kleine Kinder.","Important for reading & shopping \u2013 for speaking, the patterns are enough."],e:["Ich trinke gern kaltes Wasser.","Frisches Brot schmeckt am besten."]},q:[{t:1,q:"Ich trinke gern kalt___ Wasser.",o:["-e","-en","-es","-er"],a:2},{t:2,q:"Frisch___ Brot schmeckt am besten.",a:["es"]}],tut:"Verb+preposition ping-pong: Worauf wartest du? Wof\xFCr interessierst du dich? (rapid round)",w:"Describe your favorite outfit \u2013 every item with an adjective (endings!)."},{k:"s",f:"Verbs with prepositions",g:{t:"warten auf, sich interessieren f\xFCr",p:["Learn fixed pairs: warten auf+A, denken an+A, sich freuen auf/\xFCber+A, sich interessieren f\xFCr+A, tr\xE4umen von+D, Angst haben vor+D, sich k\xFCmmern um+A.","The preposition decides the case \u2013 a Sprachbausteine regular.","Always learn verb + preposition together as ONE word."],e:["Ich warte auf den Bus.","Sie interessiert sich f\xFCr Kunst."]},q:[{t:1,q:"Ich warte ___ den Bus.",o:["f\xFCr","auf","an","\xFCber"],a:1},{t:2,q:"Sie interessiert sich ___ Kunst.",a:["f\xFCr","fuer"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: a celebration I will never forget"]},{k:"s",f:"wo(r)- & da(r)- compounds",g:{t:"Worauf? \u2013 Darauf!",p:["Asking about things: wo(r)+preposition: Worauf wartest du? Woran denkst du?","Answering/referring back: da(r)+preposition: Ich freue mich darauf.","The r only appears before a vowel: worauf, wor\xFCber \u2013 but wovon, womit."],e:["Woran denkst du? \u2013 An meine Pr\xFCfung.","Kommst du zur Party? \u2013 Ja, ich freue mich schon darauf."]},q:[{t:1,q:"___ denkst du? \u2013 An meine Pr\xFCfung.",o:["Wof\xFCr","Woran","Worauf","Womit"],a:1},{t:2,q:"Kommst du zur Party? \u2013 Ja, ich freue mich schon ___ .",a:["darauf"]}],ext:["\u{1F5E3}\uFE0F 2-min monologue: my closest friendship"]},{k:"s",f:"n-declension + letter structure",g:{t:"den Kollegen \xB7 the letter skeleton",p:["Weak masculine nouns take -(e)n in every case except Nominativ: der Kunde \u2192 den/dem/des Kunden; also Junge, Kollege, Student, Mensch, Herr, Name.","Letter skeleton (telc writing): salutation \u2192 opening (thanks/reference) \u2192 all 4 given points with ~2 sentences each \u2192 closing line + sign-off + name.","Semi-formal: Liebe/r \u2026 + Viele Gr\xFC\xDFe \xB7 Formal: Sehr geehrte/r \u2026 + Mit freundlichen Gr\xFC\xDFen."],e:["Ich habe mit dem Kunden telefoniert.","Liebe Frau M\xFCller, \u2026 Viele Gr\xFC\xDFe, Alex"]},q:[{t:1,q:"Kennst du ___ Jungen dort?",o:["der","den","dem","des"],a:1},{t:2,q:"Ich habe mit dem Kunde___ telefoniert.",a:["n"]}],tut:"Practice telc Speaking Part 2: present a topic (celebrations in your country) \u2013 3 min straight.",w:"Collect letter building blocks: write down & memorize 2 openers, 2 transitions, 2 closers."},{k:"c",f:"CHECKPOINT 3 \u2013 Writing day",g:{t:"Checkpoint 3: your first real letter",p:["Main task today: a complete telc letter under time pressure (see tasks below).","Self-grade: salutation & sign-off? All 4 points covered? ~100 words? Connectors (weil, deshalb, trotzdem)?","The quiz below is a quick grammar check."],e:[]},q:[{t:2,q:"Ich warte schon lange ___ deine Antwort.",a:["auf"]},{t:1,q:"Sie tr\xE4gt einen blau___ Mantel.",o:["-e","-er","-en","-es"],a:2},{t:1,q:"Semi-formal sign-off at the end of a letter:",o:["Tsch\xFCss!","Viele Gr\xFC\xDFe","Bis dann!!!","Hallo"],a:1},{t:2,q:"___ freust du dich? \u2013 Auf den Urlaub.",a:["worauf"]}],tut:"CHECKPOINT: correct today's letter sentence by sentence with your tutor.",ext:["\u270D\uFE0F FULL LETTER (30-min timer!): Invite a classmate to your party \u2013 cover all 4 points: When & where? Who is coming? What to bring? How to get there?","\u2705 Self-check: letter with salutation, all 4 points & sign-off done in 30 min","\u2705 Self-check: als/nachdem/w\xE4hrend are solid","\u2705 Self-check: adjective endings ~70% correct"]},{k:"s",f:"Reading Part 1 \u2013 headlines",g:{t:"Global reading: 5 texts \u2194 10 headlines",p:["Read the TEXT first, sum up its topic in 3 words \u2013 then look for the matching headline.","Trap: headlines that reuse the same words but mean something else. Meaning beats matching words!","Max 2 minutes per text; mark anything uncertain and move on."],e:["Strategy example: a text about a library renovation \u2192 headline: Bibliothek wegen Renovierung zu"]},q:[{t:1,q:"Text: Ab Montag bleibt die Stadtbibliothek wegen Umbau vier Wochen geschlossen. \u2013 Which headline fits?",o:["Bibliothek sucht Mitarbeiter","Bibliothek wegen Renovierung zu","Neue B\xFCcher in der Bibliothek","Bibliothek jetzt l\xE4nger ge\xF6ffnet"],a:1},{t:1,q:"The headline says gewinnen, the text says einen Preis bekommen. That is \u2026",o:["the same \u2013 it fits!","the opposite","a mistake","irrelevant"],a:0}],tut:"Simulate telc Speaking Part 1 in full (getting to know each other) \u2013 run it twice."},{k:"s",f:"Reading Parts 2 & 3",g:{t:"Detail questions & ad matching",p:["Part 2 (newspaper text, 5 MC): the answers appear in text order. Find the proof in the text, never guess blind.","Part 3 (10 situations \u2194 12 ads): underline the key words of each situation; some situations have NO matching ad \u2192 mark x.","Trap: an ad that almost fits \u2013 one detail (weekday, price, place) ruins everything."],e:["Example: situation = weekend job \u2194 ad: Kellner Mo\u2013Fr \u2192 does NOT fit."]},q:[{t:1,q:"Der Kurs findet dienstags und donnerstags von 18\u201320 Uhr statt. \u2013 How often per week?",o:["Jeden Tag","Zweimal","Nur am Wochenende","Einmal"],a:1},{t:2,q:"You need a weekend job. Ad: Kellner Mo\u2013Fr gesucht. Does it fit? (ja/nein)",a:["nein","no"]}],tut:"Speaking Part 2: present a topic (e.g. shopping online) \u2013 tutor keeps time.",w:"Summarize a short online article (DW Top-Thema) in 4 of your own German sentences."},{k:"s",f:"Listening \u2013 all parts",g:{t:"Listening tactics",p:["BEFORE listening: read the tasks and underline key words \u2013 that is exactly what the pauses are for.","Missed a word? Keep listening! Context will rescue you; getting stuck costs you two answers.","At the end, NEVER leave anything blank \u2013 guessing costs nothing."],e:["Strategy: jot down numbers, places, weekdays as you listen."]},q:[{t:1,q:"You miss a word. What do you do?",o:["Stop and think about it","Keep listening \u2013 context helps","Give up","Start over"],a:1},{t:2,q:"Before listening: read the tasks and underline the ___ .",a:["keywords","key words",
