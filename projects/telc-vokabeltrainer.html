<html lang="de">

<title>Telc Wortschatz – Karteikasten</title>

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
body { min-height: 100vh; background: radial-gradient(circle at 50% 0%, #2A4F46 0%, #1D3831 60%, #162B26 100%);

.wrap { width: 100%; max-width: 420px; }
.eyebrow { font-size: 11px; letter-spacing: .22em; font-weight: 700; color: #C9A24B; text-transform: uppercase; }
h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
.hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.ghost { background: transparent; border: 1px solid rgba(237,231,214,.35); color: #EDE7D6; border-radius: 8px; padding: 8px 12px; font: 600 13px Archivo; cursor: pointer; }
.tabs { display: flex; gap: 6px; background: rgba(0,0,0,.25); padding: 5px; border-radius: 10px; margin-bottom: 14px; }
.tabbtn { border: none; padding: 9px 0; flex: 1; font: 700 15px Archivo; letter-spacing: .04em; cursor: pointer; border-radius: 7px; background: transparent; color: #EDE7D6; }
.tabbtn.on { background: #C9A24B; color: #1D2B26; }
.meta { display: flex; justify-content: space-between; font-size: 12.5px; color: #CFC8B4; margin-bottom: 8px; }
.flip-scene { perspective: 1200px; width: 100%; max-width: 420px; }
.flip-inner { position: relative; width: 100%; height: 280px; transition: transform .45s cubic-bezier(.2,.7,.3,1); transform-style: preserve-3d; cursor: pointer; }
.flip-inner.flipped { transform: rotateX(180deg); }
.face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 10px;
  background: #FBF6E9; color: #2B2820; box-shadow: 0 10px 24px rgba(0,0,0,.35), 0 2px 0 rgba(0,0,0,.15);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; overflow: hidden; }
.face::before { content: ""; position: absolute; left: 0; right: 0; top: 44px; height: 2px; background: #D2584C; opacity: .85; }
.face::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0 35px, rgba(90,130,170,.18) 35px 36px); pointer-events: none; }
.face.back { transform: rotateX(180deg); }
.face .z { position: relative; z-index: 1; text-align: center; }
.lab { font-size: 11px; letter-spacing: .2em; color: #A09A88; font-weight: 700; margin-bottom: 14px; }
.de-word { font-size: 32px; font-weight: 800; color: #2B2820; line-height: 1.2; }
.de-word.long { font-size: 26px; }
.hint { margin-top: 22px; font-size: 12.5px; color: #A09A88; }
.en-word { font-family: 'Caveat', cursive; font-size: 34px; font-weight: 700; color: #44567A; line-height: 1.15; }
.de-small { margin-top: 14px; font-size: 16px; font-weight: 600; color: #8A8474; }
.btnrow { display: flex; gap: 10px; width: 100%; max-width: 420px; margin-top: 16px; min-height: 54px; }
.actbtn { border: none; border-radius: 9px; padding: 15px 10px; flex: 1; font: 700 16px Archivo; cursor: pointer; color: #FBF6E9; box-shadow: 0 3px 0 rgba(0,0,0,.3); }
.actbtn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.3); }
.green { background: #3E8E5A; } .red { background: #B5483D; }
.neutral { background: rgba(255,255,255,.12); color: #EDE7D6; box-shadow: none; }
.boxes { display: flex; gap: 5px; align-items: flex-end; height: 70px; }
.boxcol { flex: 1; }
.boxbar { width: 100%; border-radius: 4px 4px 2px 2px; display: flex; align-items: flex-start; justify-content: center; padding-top: 2px; font-size: 11px; font-weight: 700; color: #1D2B26; box-shadow: inset 0 -3px 0 rgba(0,0,0,.18); }
.boxlabels { display: flex; gap: 5px; margin-top: 4px; }
.boxlabels div { flex: 1; text-align: center; font-size: 10px; color: #9DA796; }
.statcard { background: rgba(0,0,0,.22); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.statrow { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 6px; }
.bar { height: 8px; background: rgba(255,255,255,.12); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.bar div { height: 100%; background: #3E8E5A; }
.small { font-size: 12.5px; color: #CFC8B4; }
textarea { width: 100%; min-height: 140px; border-radius: 8px; border: none; padding: 10px; font: 14px/1.5 Archivo; background: #FBF6E9; color: #2B2820; }
.mt { margin-top: 26px; } .hide { display: none !important; }
p.help { font-size: 13px; line-height: 1.55; color: #CFC8B4; margin: 0 0 10px; }
@media (prefers-reduced-motion: reduce) { .flip-inner { transition: none; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="eyebrow">Telc Wortschatz</div>
      <h1>Karteikasten</h1>
    </div>
    <div style="display:flex;gap:8px">
      <button class="ghost" id="btnStats">Statistik</button>
      <button class="ghost" id="btnImport">+ Wörter</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- Study -->
<div id="viewStudy" class="wrap">
  <div class="meta"><span id="metaRound"></span><span id="metaMastered"></span></div>
  <div id="cardArea"></div>
  <div class="btnrow" id="btnArea"></div>
  <div class="mt">
    <div class="eyebrow" style="margin-bottom:8px">Dein Karteikasten</div>
    <div class="boxes" id="boxes"></div>
    <div class="boxlabels"><div>Fach 1</div><div>Fach 2</div><div>Fach 3</div><div>Fach 4</div><div style="color:#7FBF98">Gelernt</div></div>
  </div>
</div>

<!-- Stats -->
<div id="viewStats" class="wrap hide">
  <div id="statsArea"></div>
  <button class="ghost" id="btnReset" style="width:100%;padding:11px;border-color:#D2584C;color:#E08A80">Fortschritt zurücksetzen</button>
</div>

<!-- Import -->
<div id="viewImport" class="wrap hide">
  <div style="font-size:15px;font-weight:700;margin-bottom:6px">Wörter importieren</div>
  <p class="help">Eine Zeile pro Wort: <b>deutsches Wort ; Übersetzung</b> (auch Komma, Tab oder „–" möglich).
    So kannst du die vollständige offizielle Telc-Wortliste aus dem PDF einfügen.</p>
  <div style="display:flex;gap:6px;margin-bottom:8px" id="importTabs"></div>
  <textarea id="importText" placeholder="die Ausnahme ; exception&#10;der Begriff ; term, concept"></textarea>
  <div class="btnrow"><button class="actbtn green" id="btnDoImport">Hinzufügen</button></div>
  <div id="importMsg" style="margin-top:10px;font-size:13px;color:#C9A24B"></div>
</div>

for (const k of Object.keys(RAW)) RAW[k] = RAW[k].filter(p => p[1] !== "--");

const LEVELS = ["A1","A2","B1"], BOX_MAX = 4;

// ── Storage: Claude artifact storage if present, else localStorage ──────────
const store = {
  async get(k){ 
    if (window.storage) { try { const r = await window.storage.get(k); return r && r.value != null ? r.value : null; } catch(e){ return null; } }
    try { return localStorage.getItem(k); } catch(e){ return null; }
  },
  async set(k,v){
    if (window.storage) { try { await window.storage.set(k,v); } catch(e){} return; }
    try { localStorage.setItem(k,v); } catch(e){}
  }
};

let level="A1", progress={}, custom=[], queue=[], idx=0, flipped=false,
    right=0, wrong=0, withMastered=false, importLevel="A1", confirmReset=false, saveTimer=null;

const $ = id => document.getElementById(id);
const shuffle = a => { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function wordsFor(lv){
  const seen = new Set(), out = [];
  for (const [de,en] of RAW[lv]) { const id=lv+"|"+de; if(!seen.has(id)){seen.add(id); out.push({id,de,en});} }
  for (const w of custom) if (w.level===lv) { const id=lv+"|"+w.de; if(!seen.has(id)){seen.add(id); out.push({id,de:w.de,en:w.en});} }
  return out;
}
function stats(lv){
  const words=wordsFor(lv); let mastered=0,learning=0,fresh=0; const boxes=[0,0,0,0,0];
  for(const w of words){ const e=progress[w.id]; if(!e){fresh++;boxes[0]++;continue;} boxes[e.b]++; e.b>=BOX_MAX?mastered++:learning++; }
  return {total:words.length,mastered,learning,fresh,boxes};
}
function persist(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>store.set("telc-progress",JSON.stringify(progress)),350); }

function buildQueue(){
  const pool = wordsFor(level).filter(w => withMastered || (progress[w.id]?.b ?? 0) < BOX_MAX || !(w.id in progress));
  queue = shuffle(pool).sort((a,b)=>(progress[a.id]?.b??0)-(progress[b.id]?.b??0)).slice(0,30);
  idx=0; flipped=false; right=0; wrong=0;
  render();
}

function answer(knew){
  const w=queue[idx]; if(!w) return;
  const box=progress[w.id]?.b ?? 0;
  progress[w.id]={b: knew?Math.min(BOX_MAX,box+1):0, t:Date.now()};
  persist(); knew?right++:wrong++; flipped=false; idx++;
  render();
}

function show(view){
  $("viewStudy").classList.toggle("hide", view!=="study");
  $("viewStats").classList.toggle("hide", view!=="stats");
  $("viewImport").classList.toggle("hide", view!=="import");
  $("btnStats").textContent = view==="stats" ? "Lernen" : "Statistik";
  $("btnImport").textContent = view==="import" ? "Lernen" : "+ Wörter";
  if(view==="stats") renderStats();
}
function currentView(){ return !$("viewStats").classList.contains("hide") ? "stats" : !$("viewImport").classList.contains("hide") ? "import" : "study"; }

function renderTabs(){
  $("tabs").innerHTML = LEVELS.map(lv=>'<button class="tabbtn'+(lv===level?" on":"")+'" data-lv="'+lv+'">'+lv+"</button>").join("");
  $("tabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{ level=b.dataset.lv; store.set("telc-level",JSON.stringify(level)); show("study"); withMastered=false; renderTabs(); buildQueue(); });
  $("importTabs").innerHTML = LEVELS.map(lv=>'<button class="ghost'+'" data-lv="'+lv+'" style="'+(lv===importLevel?"background:#C9A24B;color:#1D2B26;border-color:#C9A24B":"")+'">'+lv+"</button>").join("");
  $("importTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{ importLevel=b.dataset.lv; renderTabs(); });
}

function render(){
  const s=stats(level), card=queue[idx], done=idx>=queue.length && queue.length>0;
  $("metaRound").textContent=(done?queue.length:Math.min(idx+1,queue.length))+" / "+queue.length+" in dieser Runde";
  $("metaMastered").textContent=s.mastered+"/"+s.total+" gelernt";

  if(done){
    $("cardArea").innerHTML='<div class="flip-scene"><div class="face" style="position:relative;height:280px"><div class="z">'
      +'<div style="font-size:22px;font-weight:800;margin-bottom:8px">Runde geschafft!</div>'
      +'<div style="font-size:15px;color:#56524A;margin-bottom:18px">'+right+' gewusst · '+wrong+' zum Wiederholen</div>'
      +'<button class="actbtn green" id="btnNext" style="max-width:220px">Nächste Runde</button></div></div></div>';
    $("btnArea").innerHTML="";
    $("btnNext").onclick=buildQueue;
  } else if(card){
    $("cardArea").innerHTML='<div class="flip-scene"><div class="flip-inner'+(flipped?" flipped":"")+'" id="flipCard">'
      +'<div class="face"><div class="z"><div class="lab">'+level+' · DEUTSCH</div>'
      +'<div class="de-word'+(card.de.length>18?" long":"")+'">'+esc(card.de)+'</div>'
      +'<div class="hint">Tippen zum Umdrehen</div></div></div>'
      +'<div class="face back"><div class="z"><div class="lab">ENGLISCH</div>'
      +'<div class="en-word">'+esc(card.en)+'</div><div class="de-small">'+esc(card.de)+'</div></div></div>'
      +'</div></div>';
    $("flipCard").onclick=()=>{ flipped=!flipped; render(); };
    $("btnArea").innerHTML = flipped
      ? '<button class="actbtn red" id="bNo">Nochmal üben</button><button class="actbtn green" id="bYes">Gewusst ✓</button>'
      : '<button class="actbtn neutral" id="bFlip">Antwort zeigen</button>';
    if(flipped){ $("bNo").onclick=()=>answer(false); $("bYes").onclick=()=>answer(true); }
    else $("bFlip").onclick=()=>{ flipped=true; render(); };
  } else {
    $("cardArea").innerHTML='<div style="margin-top:30px;text-align:center;color:#CFC8B4">Alles gelernt!<div style="margin-top:12px"><button class="ghost" id="bAgain">Gelernte Wörter wiederholen</button></div></div>';
    $("btnArea").innerHTML="";
    $("bAgain").onclick=()=>{ withMastered=true; buildQueue(); };
  }

  const max=Math.max(...s.boxes,1);
  $("boxes").innerHTML=s.boxes.map((n,i)=>{
    const h=16+(n/max)*48;
    const bg=i===BOX_MAX?"#3E8E5A":"rgba(251,246,233,"+(0.25+i*0.16)+")";
    const col=i===BOX_MAX?"#FBF6E9":"#1D2B26";
    return '<div class="boxcol"><div class="boxbar" style="height:'+h+'px;background:'+bg+';color:'+col+'">'+n+'</div></div>';
  }).join("");
}

function renderStats(){
  $("statsArea").innerHTML=LEVELS.map(lv=>{
    const st=stats(lv), pct=st.total?Math.round(st.mastered/st.total*100):0;
    return '<div class="statcard"><div class="statrow"><span>'+lv+'</span><span style="color:#C9A24B">'+pct+'% gelernt</span></div>'
      +'<div class="bar"><div style="width:'+pct+'%"></div></div>'
      +'<div class="small">'+st.total+' Wörter · '+st.mastered+' gelernt · '+st.learning+' in Arbeit · '+st.fresh+' neu</div></div>';
  }).join("");
}

$("btnStats").onclick=()=>show(currentView()==="stats"?"study":"stats");
$("btnImport").onclick=()=>show(currentView()==="import"?"study":"import");
$("btnReset").onclick=async()=>{
  if(!confirmReset){ confirmReset=true; $("btnReset").textContent="Wirklich? Tippe erneut zum Zurücksetzen"; $("btnReset").style.background="#D2584C"; $("btnReset").style.color="#FBF6E9";
    setTimeout(()=>{ confirmReset=false; $("btnReset").textContent="Fortschritt zurücksetzen"; $("btnReset").style.background="transparent"; $("btnReset").style.color="#E08A80"; },3000); return; }
  progress={}; confirmReset=false; await store.set("telc-progress","{}");
  $("btnReset").textContent="Fortschritt zurücksetzen"; $("btnReset").style.background="transparent"; $("btnReset").style.color="#E08A80";
  renderStats(); buildQueue();
};
$("btnDoImport").onclick=async()=>{
  const lines=$("importText").value.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  const added=[];
  for(const line of lines){
    const parts=line.split(/\t|;| – | - |,/).map(x=>x.trim()).filter(Boolean);
    if(parts.length>=2) added.push({de:parts[0],en:parts.slice(1).join(", "),level:importLevel});
  }
  if(!added.length){ $("importMsg").textContent="Keine gültigen Zeilen gefunden. Format: deutsches Wort ; Übersetzung"; return; }
  const existing=new Set([...RAW[importLevel].map(([de])=>importLevel+"|"+de), ...custom.map(w=>w.level+"|"+w.de)]);
  const fresh=added.filter(w=>!existing.has(w.level+"|"+w.de));
  custom=[...custom,...fresh];
  await store.set("telc-custom",JSON.stringify(custom));
  const dup=added.length-fresh.length;
  $("importMsg").textContent=fresh.length+" neue Wörter zu "+importLevel+" hinzugefügt"+(dup?" ("+dup+" Duplikate übersprungen)":"")+".";
  $("importText").value="";
};

document.addEventListener("keydown",e=>{
  if(currentView()!=="study"||idx>=queue.length) return;
  if(e.key===" "){ e.preventDefault(); flipped=!flipped; render(); }
  if(flipped&&e.key==="1") answer(false);
  if(flipped&&e.key==="2") answer(true);
});

(async()=>{
  try{ const v=await store.get("telc-progress"); if(v) progress=JSON.parse(v); }catch(e){}
  try{ const v=await store.get("telc-custom"); if(v){const c=JSON.parse(v); if(Array.isArray(c)) custom=c;} }catch(e){}
  try{ const v=await store.get("telc-level"); if(v){const l=JSON.parse(v); if(LEVELS.includes(l)) level=l;} }catch(e){}
  renderTabs(); buildQueue();
})();
</script>
